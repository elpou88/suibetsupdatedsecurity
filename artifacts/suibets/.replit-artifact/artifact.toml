kind = "web"
previewPath = "/"
title = "SuiBets"
version = "1.0.0"
id = "artifacts/suibets"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22568

[services.development]
run = "pnpm --filter @workspace/suibets run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/suibets", "run", "build" ]
publicDir = "artifacts/suibets/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22568"
BASE_PATH = "/"
